<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow Puzzle Game</title>
  <!-- Load Tailwind CSS for instant styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Smooth movement and fade-out animations */
    .arrow-block {
      position: absolute;
      width: 76px; height: 76px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0.5rem; cursor: pointer;
      transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out, background-color 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }
    
    /* The Shake Animation for blocked moves */
    @keyframes shake {
      0%, 100% { transform: translate(var(--tx), var(--ty)) translateX(0); }
      25% { transform: translate(var(--tx), var(--ty)) translateX(-5px); }
      50% { transform: translate(var(--tx), var(--ty)) translateX(5px); }
      75% { transform: translate(var(--tx), var(--ty)) translateX(-5px); }
    }
    .shake { 
      animation: shake 0.3s; 
      background-color: #ef4444 !important; 
    }
  </style>
</head>
<body class="bg-slate-900 flex flex-col items-center justify-center min-h-screen text-white select-none">

  <h1 id="status" class="text-3xl font-bold mb-8">Tap the Arrows</h1>
  
  <!-- Game Board (4x4 Grid) -->
  <div id="board" class="relative bg-slate-800 rounded-xl p-1 shadow-2xl border border-slate-700 overflow-hidden" style="width: 328px; height: 328px;">
    <!-- JavaScript will inject the blocks here -->
  </div>
  
  <button onclick="initGame()" class="mt-10 px-6 py-3 bg-slate-700 font-semibold rounded-md hover:bg-slate-600 transition shadow-lg">
    Reset Puzzle
  </button>

  <script>
    // --- Level Design ---
    const INITIAL_LEVEL = [
      { id: '1', x: 1, y: 1, dir: 'UP' },
      { id: '2', x: 1, y: 2, dir: 'RIGHT' },
      { id: '3', x: 2, y: 1, dir: 'LEFT' },
      { id: '4', x: 2, y: 2, dir: 'DOWN' },
      { id: '5', x: 1, y: 0, dir: 'RIGHT' },
      { id: '6', x: 3, y: 2, dir: 'UP' }
    ];

    let blocks = [];
    let escapingIds = [];

    // --- SVG Arrow Icons ---
    const getSvg = (dir) => {
      const svgs = {
        'UP': '<path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />',
        'DOWN': '<path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />',
        'LEFT': '<path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />',
        'RIGHT': '<path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />'
      };
      return `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="white" class="w-8 h-8">${svgs[dir]}</svg>`;
    };

    // --- Collision Logic ---
    function canEscape(block) {
      const obstacles = blocks.filter(b => b.id !== block.id && !escapingIds.includes(b.id));
      for (let obs of obstacles) {
        if (block.dir === 'UP' && obs.x === block.x && obs.y < block.y) return false;
        if (block.dir === 'DOWN' && obs.x === block.x && obs.y > block.y) return false;
        if (block.dir === 'LEFT' && obs.y === block.y && obs.x < block.x) return false;
        if (block.dir === 'RIGHT' && obs.y === block.y && obs.x > block.x) return false;
      }
      return true;
    }

    // --- Interaction & Animation ---
    function handleTap(block, el) {
      if (escapingIds.includes(block.id)) return;

      if (canEscape(block)) {
        // Path is clear: Animate out
        escapingIds.push(block.id);
        el.style.zIndex = '50';
        
        const dist = 500;
        let moveX = (block.x * 80) + 4;
        let moveY = (block.y * 80) + 4;

        if (block.dir === 'UP') moveY -= dist;
        if (block.dir === 'DOWN') moveY += dist;
        if (block.dir === 'LEFT') moveX -= dist;
        if (block.dir === 'RIGHT') moveX += dist;

        el.style.transform = `translate(${moveX}px, ${moveY}px)`;
        el.style.opacity = '0';

        // Remove from logic after animation
        setTimeout(() => {
          blocks = blocks.filter(b => b.id !== block.id);
          el.remove();
          if (blocks.length === 0) document.getElementById('status').innerText = "Level Cleared!";
        }, 300);
      } else {
        // Path blocked: Shake animation
        el.classList.add('shake');
        setTimeout(() => el.classList.remove('shake'), 300);
      }
    }

    // --- Game Renderer ---
    function initGame() {
      blocks = JSON.parse(JSON.stringify(INITIAL_LEVEL));
      escapingIds = [];
      document.getElementById('status').innerText = "Tap the Arrows";
      const board = document.getElementById('board');
      board.innerHTML = ''; // Clear board

      blocks.forEach(block => {
        const el = document.createElement('div');
        el.className = 'arrow-block bg-blue-500 hover:bg-blue-400 z-10';
        
        // Calculate grid position (80px per square + 4px padding)
        const posX = (block.x * 80) + 4;
        const posY = (block.y * 80) + 4;
        
        // Save base coordinates for the shake animation
        el.style.setProperty('--tx', `${posX}px`);
        el.style.setProperty('--ty', `${posY}px`);
        el.style.transform = `translate(${posX}px, ${posY}px)`;
        
        el.innerHTML = getSvg(block.dir);
        el.onclick = () => handleTap(block, el);
        board.appendChild(el);
      });
    }

    // Start the game on load
    initGame();
  </script>
</body>
</html>
